name: integrity

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Integrity check (Gates 0, 4, 5 + artifact-specific)
        run: bash scripts/integrity-check.sh

      - name: Hype-word audit (Gate 1)
        run: |
          set -e
          hits=$(grep -riE \
            'production-ready|production-grade|enterprise-grade|best-in-class|world-class|state-of-the-art|cutting-edge|battle-tested|seamless|seamlessly' \
            --include='*.md' \
            --include='*.mdx' \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=.next \
            . || true)
          if [ -n "$hits" ]; then
            echo "Hype words found:"
            echo "$hits"
            exit 1
          fi
          echo "No hype words in public docs"
